[tool.coverage.run]
branch = true
source = [ "libs/recommend_api_client" ]

[tool.coverage.report]
exclude_lines = ['if TYPE_CHECKING:']
show_missing = true

[tool.pytest.ini_options]
addopts = """
 --cov
 --cov-report html:'../../../../coverage/libs/api-clients/python/recommend-api-client/html'
 --cov-report xml:'../../../../coverage/libs/api-clients/python/recommend-api-client/coverage.xml'
 --html='../../../../reports/libs/api-clients/python/recommend-api-client/unittests/html/index.html'
 --junitxml='../../../../reports/libs/api-clients/python/recommend-api-client/unittests/junit.xml'
"""

[tool.poetry]
name = "recommend-api-client"
version = "1.0.0"
description = "Automatically generated by Nx."
authors = [ ]
license = 'Proprietary'
readme = 'README.md'

  [[tool.poetry.packages]]
  include = "libs/recommend_api_client"

  [tool.poetry.dependencies]
  python = ">=3.10,<3.11"

  [tool.poetry.group.dev.dependencies]
  autopep8 = "2.3.1"
  flake8 = "7.1.1"
  pytest = "8.3.4"
  pytest-sugar = "1.0.0"
  pytest-cov = "6.0.0"
  pytest-html = "4.1.1"
  openapi-python-client = ">=0.21.0,<0.29.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
