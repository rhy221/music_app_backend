asyncapi: 3.0.0
info:
  title: Music Streaming Domain Events
  description: |
    RabbitMQ event contracts cho cross-service communication.
    Tất cả events dùng JSON format. Mỗi event có header chung
    (eventId, eventType, timestamp, sourceService).
    Dùng AsyncAPI Generator hoặc manual DTO generation từ schemas.
  version: 1.0.0

channels:
  track.uploaded:
    address: events.track.uploaded
    description: Upload service → khi file được upload thành công lên MinIO
    messages:
      trackUploaded:
        $ref: '#/components/messages/TrackUploadedEvent'

  transcode.completed:
    address: events.transcode.completed
    description: Upload service → khi tất cả bitrate đã transcode xong
    messages:
      transcodeCompleted:
        $ref: '#/components/messages/TranscodeCompletedEvent'

  transcode.failed:
    address: events.transcode.failed
    description: Upload service → khi transcode thất bại (saga compensation)
    messages:
      transcodeFailed:
        $ref: '#/components/messages/TranscodeFailedEvent'

  track.published:
    address: events.track.published
    description: Catalog service → khi track mới được publish
    messages:
      trackPublished:
        $ref: '#/components/messages/TrackPublishedEvent'

  track.updated:
    address: events.track.updated
    description: Catalog service → khi track metadata thay đổi
    messages:
      trackUpdated:
        $ref: '#/components/messages/TrackUpdatedEvent'

  track.deleted:
    address: events.track.deleted
    description: Catalog service → khi track bị xóa
    messages:
      trackDeleted:
        $ref: '#/components/messages/TrackDeletedEvent'

  track.played:
    address: events.track.played
    description: Streaming service → khi user nghe đạt ngưỡng tính 1 play
    messages:
      trackPlayed:
        $ref: '#/components/messages/TrackPlayedEvent'

  user.registered:
    address: events.user.registered
    description: User service → khi user mới đăng ký
    messages:
      userRegistered:
        $ref: '#/components/messages/UserRegisteredEvent'

  user.followed:
    address: events.user.followed
    description: User service → khi user A follow user B
    messages:
      userFollowed:
        $ref: '#/components/messages/UserFollowedEvent'

  playlist.shared:
    address: events.playlist.shared
    description: Playlist service → khi playlist được share
    messages:
      playlistShared:
        $ref: '#/components/messages/PlaylistSharedEvent'

  playlist.collaborator.added:
    address: events.playlist.collaborator.added
    description: Playlist service → khi thêm collaborator
    messages:
      collaboratorAdded:
        $ref: '#/components/messages/CollaboratorAddedEvent'

  playlist.track.added:
    address: events.playlist.track.added
    description: Playlist service → khi thêm track vào playlist
    messages:
      playlistTrackAdded:
        $ref: '#/components/messages/PlaylistTrackAddedEvent'

operations:
  onTrackUploaded:
    action: receive
    channel:
      $ref: '#/channels/track.uploaded'
    messages:
      - $ref: '#/channels/track.uploaded/messages/trackUploaded'
  onTranscodeCompleted:
    action: receive
    channel:
      $ref: '#/channels/transcode.completed'
    messages:
      - $ref: '#/channels/transcode.completed/messages/transcodeCompleted'
  onTranscodeFailed:
    action: receive
    channel:
      $ref: '#/channels/transcode.failed'
    messages:
      - $ref: '#/channels/transcode.failed/messages/transcodeFailed'
  onTrackPublished:
    action: receive
    channel:
      $ref: '#/channels/track.published'
    messages:
      - $ref: '#/channels/track.published/messages/trackPublished'
  onTrackUpdated:
    action: receive
    channel:
      $ref: '#/channels/track.updated'
    messages:
      - $ref: '#/channels/track.updated/messages/trackUpdated'
  onTrackDeleted:
    action: receive
    channel:
      $ref: '#/channels/track.deleted'
    messages:
      - $ref: '#/channels/track.deleted/messages/trackDeleted'
  onTrackPlayed:
    action: receive
    channel:
      $ref: '#/channels/track.played'
    messages:
      - $ref: '#/channels/track.played/messages/trackPlayed'
  onUserRegistered:
    action: receive
    channel:
      $ref: '#/channels/user.registered'
    messages:
      - $ref: '#/channels/user.registered/messages/userRegistered'
  onUserFollowed:
    action: receive
    channel:
      $ref: '#/channels/user.followed'
    messages:
      - $ref: '#/channels/user.followed/messages/userFollowed'
  onPlaylistShared:
    action: receive
    channel:
      $ref: '#/channels/playlist.shared'
    messages:
      - $ref: '#/channels/playlist.shared/messages/playlistShared'
  onPlaylistCollaboratorAdded:
    action: receive
    channel:
      $ref: '#/channels/playlist.collaborator.added'
    messages:
      - $ref: '#/channels/playlist.collaborator.added/messages/collaboratorAdded'
  onPlaylistTrackAdded:
    action: receive
    channel:
      $ref: '#/channels/playlist.track.added'
    messages:
      - $ref: '#/channels/playlist.track.added/messages/playlistTrackAdded'
components:
  messages:
    TrackUploadedEvent:
      name: TrackUploadedEvent
      payload:
        $ref: '#/components/schemas/TrackUploadedPayload'

    TranscodeCompletedEvent:
      name: TranscodeCompletedEvent
      payload:
        $ref: '#/components/schemas/TranscodeCompletedPayload'

    TranscodeFailedEvent:
      name: TranscodeFailedEvent
      payload:
        $ref: '#/components/schemas/TranscodeFailedPayload'

    TrackPublishedEvent:
      name: TrackPublishedEvent
      payload:
        $ref: '#/components/schemas/TrackPublishedPayload'

    TrackUpdatedEvent:
      name: TrackUpdatedEvent
      payload:
        $ref: '#/components/schemas/TrackUpdatedPayload'

    TrackDeletedEvent:
      name: TrackDeletedEvent
      payload:
        $ref: '#/components/schemas/TrackDeletedPayload'

    TrackPlayedEvent:
      name: TrackPlayedEvent
      payload:
        $ref: '#/components/schemas/TrackPlayedPayload'

    UserRegisteredEvent:
      name: UserRegisteredEvent
      payload:
        $ref: '#/components/schemas/UserRegisteredPayload'

    UserFollowedEvent:
      name: UserFollowedEvent
      payload:
        $ref: '#/components/schemas/UserFollowedPayload'

    PlaylistSharedEvent:
      name: PlaylistSharedEvent
      payload:
        $ref: '#/components/schemas/PlaylistSharedPayload'

    CollaboratorAddedEvent:
      name: CollaboratorAddedEvent
      payload:
        $ref: '#/components/schemas/CollaboratorAddedPayload'

    PlaylistTrackAddedEvent:
      name: PlaylistTrackAddedEvent
      payload:
        $ref: '#/components/schemas/PlaylistTrackAddedPayload'

  schemas:
    EventHeader:
      type: object
      description: Header chung cho tất cả events
      required: [eventId, eventType, timestamp, sourceService]
      properties:
        eventId:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time
        sourceService:
          type: string
        correlationId:
          type: string
          format: uuid
          description: Dùng cho distributed tracing

    TrackUploadedPayload:
      allOf:
        - $ref: '#/components/schemas/EventHeader'
        - type: object
          properties:
            eventType:
              type: string
              const: TRACK_UPLOADED
            data:
              $ref: '#/components/schemas/TrackUploadedData'
    TranscodeCompletedPayload:
      allOf:
        - $ref: '#/components/schemas/EventHeader'
        - type: object
          properties:
            eventType:
              type: string
              const: TRANSCODE_COMPLETED
            data:
              $ref: '#/components/schemas/TranscodeCompletedData'
    TranscodeFailedPayload:
      allOf:
        - $ref: '#/components/schemas/EventHeader'
        - type: object
          properties:
            eventType:
              type: string
              const: TRANSCODE_FAILED
            data:
              $ref: '#/components/schemas/TranscodeFailedData'
    TrackPublishedPayload:
      allOf:
        - $ref: '#/components/schemas/EventHeader'
        - type: object
          properties:
            eventType:
              type: string
              const: TRACK_PUBLISHED
            data:
              $ref: '#/components/schemas/TrackPublishedData'
    TrackUpdatedPayload:
      allOf:
        - $ref: '#/components/schemas/EventHeader'
        - type: object
          properties:
            eventType:
              type: string
              const: TRACK_UPDATED
            data:
              $ref: '#/components/schemas/TrackUpdatedData'
    TrackDeletedPayload:
      allOf:
        - $ref: '#/components/schemas/EventHeader'
        - type: object
          properties:
            eventType:
              type: string
              const: TRACK_DELETED
            data:
              $ref: '#/components/schemas/TrackDeletedData'
    TrackPlayedPayload:
      allOf:
        - $ref: '#/components/schemas/EventHeader'
        - type: object
          properties:
            eventType:
              type: string
              const: TRACK_PLAYED
            data:
              $ref: '#/components/schemas/TrackPlayedData'
    UserRegisteredPayload:
      allOf:
        - $ref: '#/components/schemas/EventHeader'
        - type: object
          properties:
            eventType:
              type: string
              const: USER_REGISTERED
            data:
              $ref: '#/components/schemas/UserRegisteredData'
    UserFollowedPayload:
      allOf:
        - $ref: '#/components/schemas/EventHeader'
        - type: object
          properties:
            eventType:
              type: string
              const: USER_FOLLOWED
            data:
              $ref: '#/components/schemas/UserFollowedData'
    PlaylistSharedPayload:
      allOf:
        - $ref: '#/components/schemas/EventHeader'
        - type: object
          properties:
            eventType:
              type: string
              const: PLAYLIST_SHARED
            data:
              $ref: '#/components/schemas/PlaylistSharedData'
    CollaboratorAddedPayload:
      allOf:
        - $ref: '#/components/schemas/EventHeader'
        - type: object
          properties:
            eventType:
              type: string
              const: COLLABORATOR_ADDED
            data:
              $ref: '#/components/schemas/CollaboratorAddedData'

    PlaylistTrackAddedPayload:
      allOf:
        - $ref: '#/components/schemas/EventHeader'
        - type: object
          properties:
            eventType:
              type: string
              const: PLAYLIST_TRACK_ADDED
            data:
              $ref: '#/components/schemas/PlaylistTrackAddedData'
    TrackUploadedData:
      type: object
      properties:
        uploadJobId:
          type: string
          format: uuid
        uploaderId:
          type: string
          format: uuid
        originalFilename:
          type: string
        title:
          type: string
        genre:
          type: string
          nullable: true
        storageUrl:
          type: string
          format: uri
        sizeBytes:
          type: integer
          format: int64

    TranscodeCompletedDataAssetsItemFormat:
      type: string
      enum: [MP3, AAC, FLAC, OGG]
    TranscodeCompletedDataAssetsItem:
      type: object
      properties:
        bitrate:
          type: integer
        format:
          $ref: '#/components/schemas/TranscodeCompletedDataAssetsItemFormat'
        storageUrl:
          type: string
          format: uri
        sizeBytes:
          type: integer
          format: int64

    TranscodeCompletedData:
      type: object
      properties:
        uploadJobId:
          type: string
          format: uuid
        uploaderId:
          type: string
          format: uuid
        title:
          type: string
        genre:
          type: string
          nullable: true
        albumId:
          type: string
          format: uuid
          nullable: true
        durationMs:
          type: integer
        waveformUrl:
          type: string
          format: uri
          nullable: true
        assets:
          type: array
          items:
            $ref: '#/components/schemas/TranscodeCompletedDataAssetsItem'
    TranscodeFailedData:
      type: object
      properties:
        uploadJobId:
          type: string
          format: uuid
        uploaderId:
          type: string
          format: uuid
        errorMessage:
          type: string
        originalStorageUrl:
          type: string
          format: uri
          description: URL file gốc cần cleanup

    TrackPublishedDataAssetsItem:
      type: object
      properties:
        bitrate:
          type: integer
        format:
          type: string
        storageUrl:
          type: string
          format: uri

    TrackPublishedData:
      type: object
      description: Full track info cho consumers sync local data
      properties:
        trackId:
          type: string
          format: uuid
        title:
          type: string
        durationMs:
          type: integer
        coverUrl:
          type: string
          format: uri
          nullable: true
        genre:
          type: string
        artistId:
          type: string
          format: uuid
        artistName:
          type: string
        albumId:
          type: string
          format: uuid
          nullable: true
        albumTitle:
          type: string
          nullable: true
        assets:
          type: array
          items:
            $ref: '#/components/schemas/TrackPublishedDataAssetsItem'
    TrackUpdatedData:
      type: object
      properties:
        trackId:
          type: string
          format: uuid
        title:
          type: string
        genre:
          type: string
        coverUrl:
          type: string
          format: uri
          nullable: true
        artistName:
          type: string

    TrackDeletedData:
      type: object
      properties:
        trackId:
          type: string
          format: uuid

    TrackPlayedDataSource:
      type: string
      enum: [BROWSE, PLAYLIST, SEARCH, RECOMMENDATION, ALBUM, ARTIST]
    TrackPlayedData:
      type: object
      description: Enriched event — embed genre/artistId để consumer không cần query Catalog
      properties:
        userId:
          type: string
          format: uuid
        trackId:
          type: string
          format: uuid
        genre:
          type: string
        artistId:
          type: string
          format: uuid
        durationMs:
          type: integer
          description: Thời gian đã nghe thực tế
        source:
          $ref: '#/components/schemas/TrackPlayedDataSource'
        completedFull:
          type: boolean
        playedAt:
          type: string
          format: date-time

    UserRegisteredData:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        displayName:
          type: string
        email:
          type: string
          format: email

    UserFollowedData:
      type: object
      properties:
        followerId:
          type: string
          format: uuid
        followerName:
          type: string
        followingId:
          type: string
          format: uuid

    PlaylistSharedData:
      type: object
      properties:
        playlistId:
          type: string
          format: uuid
        playlistName:
          type: string
        ownerId:
          type: string
          format: uuid
        ownerName:
          type: string
        sharedWithUserId:
          type: string
          format: uuid

    CollaboratorAddedDataRole:
      type: string
      enum: [EDITOR, VIEWER]
    CollaboratorAddedData:
      type: object
      properties:
        playlistId:
          type: string
          format: uuid
        playlistName:
          type: string
        ownerId:
          type: string
          format: uuid
        collaboratorId:
          type: string
          format: uuid
        role:
          $ref: '#/components/schemas/CollaboratorAddedDataRole'
    PlaylistTrackAddedData:
      type: object
      properties:
        playlistId:
          type: string
          format: uuid
        playlistName:
          type: string
        trackId:
          type: string
          format: uuid
        trackTitle:
          type: string
        addedBy:
          type: string
          format: uuid
        addedByName:
          type: string
        collaboratorIds:
          type: array
          items:
            type: string
            format: uuid
          description: IDs of collaborators to notify