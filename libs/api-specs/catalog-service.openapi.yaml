openapi: 3.1.0
info:
  title: Music Catalog Service
  description: |
    Bounded Context: Music Catalog (Core Domain).
    CRUD tracks, albums, artists, assets. CQRS write side — command endpoints.
    Read queries delegate to Search Service (Elasticsearch).
    Language: Java (Spring Boot 4.0.6 + Spring Data JPA).
  version: 1.0.0

servers:
  - url: http://localhost:8082
    description: Local dev
  - url: http://catalog-service:8082
    description: K8s internal

tags:
  - name: Tracks
    description: Track management
  - name: Albums
    description: Album management
  - name: Artists
    description: Artist profiles
  - name: Internal
    description: Inter-service endpoints (not exposed via Gateway)

paths:
  /api/v1/tracks:
    get:
      operationId: listTracks
      tags: [Tracks]
      summary: Browse tracks (paginated, filterable)
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - name: genre
          in: query
          schema:
            $ref: '#/components/schemas/Genre'
        - name: artistId
          in: query
          schema:
            type: string
            format: uuid
        - name: albumId
          in: query
          schema:
            type: string
            format: uuid
        - name: sort
          in: query
          schema:
            type: string
            enum: [newest, oldest, popular, title_asc, title_desc]
            default: newest
      responses:
        '200':
          description: Danh sách tracks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTracks'

  /api/v1/tracks/{trackId}:
    get:
      operationId: getTrackById
      tags: [Tracks]
      summary: Chi tiết một track
      parameters:
        - $ref: '#/components/parameters/trackId'
      responses:
        '200':
          description: Track detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackDetail'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      operationId: updateTrack
      tags: [Tracks]
      summary: Cập nhật metadata track (artist owner hoặc admin)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/trackId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTrackRequest'
      responses:
        '200':
          description: Track đã cập nhật
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackDetail'
        '403':
          $ref: '#/components/responses/Forbidden'

    delete:
      operationId: deleteTrack
      tags: [Tracks]
      summary: Xóa track (soft delete)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/trackId'
      responses:
        '204':
          description: Track đã xóa
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/tracks/popular:
    get:
      operationId: getPopularTracks
      tags: [Tracks]
      summary: Top tracks phổ biến
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - name: genre
          in: query
          schema:
            $ref: '#/components/schemas/Genre'
        - name: period
          in: query
          schema:
            type: string
            enum: [day, week, month, all]
            default: week
      responses:
        '200':
          description: Danh sách top tracks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TrackSummary'

  /api/v1/tracks/new-releases:
    get:
      operationId: getNewReleases
      tags: [Tracks]
      summary: Tracks mới phát hành
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      responses:
        '200':
          description: Tracks mới
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TrackSummary'

  /api/v1/albums:
    get:
      operationId: listAlbums
      tags: [Albums]
      summary: Browse albums
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - name: artistId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Danh sách albums
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAlbums'

    post:
      operationId: createAlbum
      tags: [Albums]
      summary: Tạo album mới (artist)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAlbumRequest'
      responses:
        '201':
          description: Album đã tạo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlbumDetail'

  /api/v1/albums/{albumId}:
    get:
      operationId: getAlbumById
      tags: [Albums]
      summary: Chi tiết album + danh sách tracks
      parameters:
        - $ref: '#/components/parameters/albumId'
      responses:
        '200':
          description: Album detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlbumDetail'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      operationId: updateAlbum
      tags: [Albums]
      summary: Cập nhật album
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/albumId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAlbumRequest'
      responses:
        '200':
          description: Album đã cập nhật
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlbumDetail'

  /api/v1/artists:
    get:
      operationId: listArtists
      tags: [Artists]
      summary: Browse artists
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200':
          description: Danh sách artists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedArtists'

  /api/v1/artists/{artistId}:
    get:
      operationId: getArtistById
      tags: [Artists]
      summary: Artist profile + discography
      parameters:
        - $ref: '#/components/parameters/artistId'
      responses:
        '200':
          description: Artist detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtistDetail'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      operationId: updateArtist
      tags: [Artists]
      summary: Cập nhật artist profile
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/artistId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateArtistRequest'
      responses:
        '200':
          description: Artist đã cập nhật
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtistDetail'

  /api/v1/internal/tracks/{trackId}:
    get:
      operationId: getInternalTrack
      tags: [Internal]
      summary: "[INTERNAL] Track info cho inter-service call"
      parameters:
        - $ref: '#/components/parameters/trackId'
      responses:
        '200':
          description: Internal track info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalTrackDto'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/internal/tracks/batch:
    post:
      operationId: getInternalTracksBatch
      tags: [Internal]
      summary: "[INTERNAL] Batch lấy tracks"
      description: Cho Playlist service resolve track metadata.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [trackIds]
              properties:
                trackIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                  maxItems: 200
      responses:
        '200':
          description: Map of trackId to internal track info
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/InternalTrackDto'

  /api/v1/internal/tracks/publish:
    post:
      operationId: publishTrackFromUpload
      tags: [Internal]
      summary: "[INTERNAL] Tạo track từ Upload service sau khi transcode xong"
      description: |
        Called by event handler khi nhận TranscodeCompletedEvent.
        Tạo track + assets records trong Catalog DB.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishTrackRequest'
      responses:
        '201':
          description: Track đã publish
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackDetail'
        '400':
          $ref: '#/components/responses/ValidationError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    trackId:
      name: trackId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    albumId:
      name: albumId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    artistId:
      name: artistId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
    size:
      name: size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  responses:
    NotFound:
      description: Resource không tồn tại
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Không có quyền
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Dữ liệu không hợp lệ
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    Genre:
      type: string
      enum:
        - POP
        - ROCK
        - HIPHOP
        - RNB
        - ELECTRONIC
        - JAZZ
        - CLASSICAL
        - COUNTRY
        - LATIN
        - KPOP
        - VPOP
        - INDIE
        - OTHER

    TrackStatus:
      type: string
      enum: [DRAFT, PUBLISHED, ARCHIVED]

    AudioFormat:
      type: string
      enum: [MP3, AAC, FLAC, OGG]

    TrackSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        durationMs:
          type: integer
          description: Thời lượng (milliseconds)
        coverUrl:
          type: string
          format: uri
          nullable: true
        genre:
          $ref: '#/components/schemas/Genre'
        playCount:
          type: integer
          format: int64
        artist:
          $ref: '#/components/schemas/ArtistSummary'
        album:
          $ref: '#/components/schemas/AlbumSummary'

    TrackDetail:
      allOf:
        - $ref: '#/components/schemas/TrackSummary'
        - type: object
          properties:
            status:
              $ref: '#/components/schemas/TrackStatus'
            releaseDate:
              type: string
              format: date
              nullable: true
            assets:
              type: array
              items:
                $ref: '#/components/schemas/AudioAsset'
            waveformUrl:
              type: string
              format: uri
              nullable: true
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time

    AudioAsset:
      type: object
      properties:
        id:
          type: string
          format: uuid
        bitrate:
          type: integer
          description: Bitrate (kbps)
          example: 320
        format:
          $ref: '#/components/schemas/AudioFormat'
        storageUrl:
          type: string
          format: uri
        sizeBytes:
          type: integer
          format: int64

    ArtistSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        avatarUrl:
          type: string
          format: uri
          nullable: true

    ArtistDetail:
      allOf:
        - $ref: '#/components/schemas/ArtistSummary'
        - type: object
          properties:
            bio:
              type: string
              nullable: true
            userId:
              type: string
              format: uuid
              description: Linked user account
            trackCount:
              type: integer
            albumCount:
              type: integer
            followerCount:
              type: integer
            topTracks:
              type: array
              items:
                $ref: '#/components/schemas/TrackSummary'
            albums:
              type: array
              items:
                $ref: '#/components/schemas/AlbumSummary'

    AlbumSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        coverUrl:
          type: string
          format: uri
          nullable: true
        releaseDate:
          type: string
          format: date
          nullable: true
        trackCount:
          type: integer

    AlbumDetail:
      allOf:
        - $ref: '#/components/schemas/AlbumSummary'
        - type: object
          properties:
            artist:
              $ref: '#/components/schemas/ArtistSummary'
            tracks:
              type: array
              items:
                $ref: '#/components/schemas/TrackSummary'
            totalDurationMs:
              type: integer
              format: int64

    InternalTrackDto:
      type: object
      description: Minimal track info cho inter-service use
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        durationMs:
          type: integer
        coverUrl:
          type: string
          format: uri
          nullable: true
        genre:
          $ref: '#/components/schemas/Genre'
        artistId:
          type: string
          format: uuid
        artistName:
          type: string
        assets:
          type: array
          items:
            $ref: '#/components/schemas/AudioAsset'

    UpdateTrackRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        genre:
          $ref: '#/components/schemas/Genre'
        albumId:
          type: string
          format: uuid
          nullable: true
        releaseDate:
          type: string
          format: date

    CreateAlbumRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        releaseDate:
          type: string
          format: date
        coverUrl:
          type: string
          format: uri

    UpdateAlbumRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        releaseDate:
          type: string
          format: date
        coverUrl:
          type: string
          format: uri

    UpdateArtistRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        bio:
          type: string
          maxLength: 2000
        avatarUrl:
          type: string
          format: uri

    PublishTrackRequest:
      type: object
      required: [uploadJobId, uploaderId, title, durationMs, assets]
      properties:
        uploadJobId:
          type: string
          format: uuid
        uploaderId:
          type: string
          format: uuid
        title:
          type: string
        durationMs:
          type: integer
        genre:
          $ref: '#/components/schemas/Genre'
        albumId:
          type: string
          format: uuid
          nullable: true
        assets:
          type: array
          minItems: 1
          items:
            type: object
            required: [bitrate, format, storageUrl, sizeBytes]
            properties:
              bitrate:
                type: integer
              format:
                $ref: '#/components/schemas/AudioFormat'
              storageUrl:
                type: string
                format: uri
              sizeBytes:
                type: integer
                format: int64
        waveformUrl:
          type: string
          format: uri

    PaginatedTracks:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/TrackSummary'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer

    PaginatedAlbums:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/AlbumSummary'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer

    PaginatedArtists:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ArtistSummary'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer

    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        timestamp:
          type: string
          format: date-time
