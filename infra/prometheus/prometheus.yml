global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'spring-boot-services'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'host.docker.internal:8081' # user-service
          - 'host.docker.internal:8082' # catalog-service
          - 'host.docker.internal:8083' # playlist-service
          - 'host.docker.internal:8088' # library-service

  - job_name: 'nestjs-services'
    metrics_path: '/api/metrics'
    static_configs:
      - targets:
          - 'host.docker.internal:8085' # search-service
          - 'host.docker.internal:8087' # notification-service

  - job_name: 'go-services'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'host.docker.internal:8086' # upload-service
          - 'host.docker.internal:8084' # streaming-service

  - job_name: 'krakend-gateway'
    static_configs:
      - targets: ['gateway:9091']