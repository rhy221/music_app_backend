version: '3.8' 
services: 
  postgres: 
    image: postgres:16 
    environment: 
      POSTGRES_USER: admin 
      POSTGRES_PASSWORD: password 
      POSTGRES_DB: music_db 
    ports: 
      - "5432:5432" 
  redis: 
    image: redis:7 
    ports: 
      - "6379:6379" 
  rabbitmq: 
    image: rabbitmq:3.13-management 
    ports: 
      - "5672:5672" 
      - "15672:15672" 
  minio: 
    image: minio/minio 
    command: server /data --console-address ":9001" 
    environment: 
      MINIO_ROOT_USER: admin 
      MINIO_ROOT_PASSWORD: password123 
    ports: 
      - "9000:9000" 
      - "9001:9001" 
