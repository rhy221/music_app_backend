services:

  # ─── PostgreSQL 16 — 5 service databases ─────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: music-postgres
    environment:
      POSTGRES_USER: music_admin
      POSTGRES_PASSWORD: music_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U music_admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Neo4j 5 Community — Recommendation Graph DB ─────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: music-neo4j
    environment:
      NEO4J_AUTH: neo4j/music_pass
      NEO4J_PLUGINS: '["graph-data-science"]'
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 512m
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ─── MongoDB 7 — Notification DB ─────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: music-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: music_admin
      MONGO_INITDB_ROOT_PASSWORD: music_pass
      MONGO_INITDB_DATABASE: notifications
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Elasticsearch 8 — Search Index ──────────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.17.0
    container_name: music-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=music-cluster
      - node.name=music-es-node
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    ulimits:
      memlock:
        soft: -1
        hard: -1
    restart: unless-stopped

  # ─── Redis 7 — Cache Layer ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: music-redis
    command: >
      redis-server
      --requirepass music_pass
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "music_pass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── MinIO — Object Storage (S3-compatible) ───────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: music-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: music_admin
      MINIO_ROOT_PASSWORD: music_pass
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # MinIO — init: create buckets after MinIO is ready
  minio-init:
    image: minio/mc:latest
    container_name: music-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 music_admin music_pass
        mc mb --ignore-existing local/images
        mc mb --ignore-existing local/audio
        mc anonymous set download local/images
        echo "✓ MinIO buckets ready"
    restart: on-failure

  # ─── RabbitMQ 3.13 — Event Bus ───────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: music-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: music_admin
      RABBITMQ_DEFAULT_PASS: music_pass
      RABBITMQ_DEFAULT_VHOST: music
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # RabbitMQ — init: create topic exchanges after broker is ready
  rabbitmq-init:
    image: curlimages/curl:latest
    container_name: music-rabbitmq-init
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./docker/rabbitmq/init.sh:/init.sh:ro
    entrypoint: ["sh", "/init.sh"]
    restart: on-failure

  # ─── API Gateway (KrakenD) ───────────────────────────────────────────────────
  gateway:
    build:
      context: ../services/gateway
      dockerfile: Dockerfile
    container_name: music-gateway
    environment:
      JWT_SECRET_KEY: "${JWT_SECRET:-change-me-in-production-min-32-chars}"
    ports:
      - "8080:8080"   # API Gateway
      - "9091:9091"   # Prometheus metrics
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:8080/__health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped


# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  mongodb_data:
  elasticsearch_data:
  redis_data:
  minio_data:
  rabbitmq_data:

# ─── Network ──────────────────────────────────────────────────────────────────
networks:
  default:
    name: music-app-network
