services:

  # ─── PostgreSQL 16 — 5 service databases ─────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: music-postgres
    environment:
      POSTGRES_USER: music_admin
      POSTGRES_PASSWORD: music_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U music_admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Neo4j 5 Community — Recommendation Graph DB ─────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: music-neo4j
    environment:
      NEO4J_AUTH: neo4j/music_pass
      NEO4J_PLUGINS: '["graph-data-science"]'
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 512m
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s
    restart: unless-stopped

  # ─── MongoDB 7 — Notification DB ─────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: music-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: music_admin
      MONGO_INITDB_ROOT_PASSWORD: music_pass
      MONGO_INITDB_DATABASE: notifications
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Elasticsearch 8 — Search Index ──────────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.17.0
    container_name: music-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=music-cluster
      - node.name=music-es-node
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    ulimits:
      memlock:
        soft: -1
        hard: -1
    restart: unless-stopped

  # ─── Redis 7 — Cache Layer ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: music-redis
    command: >
      redis-server
      --requirepass music_pass
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "music_pass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── MinIO — Object Storage (S3-compatible) ───────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: music-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: music_admin
      MINIO_ROOT_PASSWORD: music_pass
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # MinIO — init: create buckets after MinIO is ready
  minio-init:
    image: minio/mc:latest
    container_name: music-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 music_admin music_pass
        mc mb --ignore-existing local/images
        mc mb --ignore-existing local/audio
        mc anonymous set download local/images
        echo "✓ MinIO buckets ready"
    restart: on-failure

  # ─── RabbitMQ 3.13 — Event Bus ───────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: music-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: music_admin
      RABBITMQ_DEFAULT_PASS: music_pass
      RABBITMQ_DEFAULT_VHOST: music
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # RabbitMQ — init: create topic exchanges after broker is ready
  rabbitmq-init:
    image: curlimages/curl:latest
    container_name: music-rabbitmq-init
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./docker/rabbitmq/init.sh:/init.sh:ro
    entrypoint: ["sh", "/init.sh"]
    restart: on-failure

  # ═══════════════════════════════════════════════════════════════════════════════
  # APPLICATION SERVICES
  # ═══════════════════════════════════════════════════════════════════════════════

  # ─── API Gateway (KrakenD) ───────────────────────────────────────────────────
  gateway:
    build:
      context: ../services/gateway
      dockerfile: Dockerfile
    container_name: music-gateway
    environment:
      JWT_SECRET_KEY: "${JWT_SECRET:-change-me-in-production-min-32-chars}"
    ports:
      - "8080:8080"   # API Gateway
      - "9091:9091"   # Prometheus metrics
    logging:
      driver: gelf
      options:
        gelf-address: "udp://host.docker.internal:12201"
        tag: "gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:8080/__health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    depends_on:
      rabbitmq-init:
        condition: service_completed_successfully
      logstash:
        condition: service_healthy

  # ─── User Service (Spring Boot) ──────────────────────────────────────────────
  user-service:
    build:
      context: ..
      dockerfile: services/user-service/Dockerfile
    container_name: music-user-service
    environment:
      DB_HOST: music-postgres
      DB_NAME: user_db
      REDIS_HOST: music-redis
      REDIS_PASSWORD: music_pass
      RABBITMQ_HOST: music-rabbitmq
      RABBITMQ_USER: music_admin
      RABBITMQ_PASSWORD: music_pass
      RABBITMQ_VHOST: music
      MINIO_ENDPOINT: http://music-minio:9000
      MINIO_ACCESS_KEY: music_admin
      MINIO_SECRET_KEY: music_pass
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production-min-32-chars}"
      SPRING_PROFILES_ACTIVE: logstash
      LOGSTASH_HOST: music-logstash
      LOGSTASH_PORT: 5044
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      logstash:
        condition: service_healthy
    restart: unless-stopped

  # ─── Catalog Service (Spring Boot) ───────────────────────────────────────────
  catalog-service:
    build:
      context: ..
      dockerfile: services/catalog-service/Dockerfile
    container_name: music-catalog-service
    environment:
      DB_HOST: music-postgres
      DB_NAME: catalog_db
      REDIS_HOST: music-redis
      REDIS_PASSWORD: music_pass
      RABBITMQ_HOST: music-rabbitmq
      RABBITMQ_USER: music_admin
      RABBITMQ_PASSWORD: music_pass
      RABBITMQ_VHOST: music
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production-min-32-chars}"
      SPRING_PROFILES_ACTIVE: logstash
      LOGSTASH_HOST: music-logstash
      LOGSTASH_PORT: 5044
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq-init:
        condition: service_completed_successfully
      logstash:
        condition: service_healthy
    restart: unless-stopped

  # ─── Playlist Service (Spring Boot) ──────────────────────────────────────────
  playlist-service:
    build:
      context: ..
      dockerfile: services/playlist-service/Dockerfile
    container_name: music-playlist-service
    environment:
      DB_HOST: music-postgres
      DB_NAME: playlist_db
      REDIS_HOST: music-redis
      REDIS_PASSWORD: music_pass
      RABBITMQ_HOST: music-rabbitmq
      RABBITMQ_USER: music_admin
      RABBITMQ_PASSWORD: music_pass
      RABBITMQ_VHOST: music
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production-min-32-chars}"
      SPRING_PROFILES_ACTIVE: logstash
      LOGSTASH_HOST: music-logstash
      LOGSTASH_PORT: 5044
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq-init:
        condition: service_completed_successfully
      logstash:
        condition: service_healthy
    restart: unless-stopped

  # ─── Library Service (Spring Boot) ───────────────────────────────────────────
  library-service:
    build:
      context: ..
      dockerfile: services/library-service/Dockerfile
    container_name: music-library-service
    environment:
      DB_HOST: music-postgres
      DB_NAME: library_db
      REDIS_HOST: music-redis
      REDIS_PASSWORD: music_pass
      RABBITMQ_HOST: music-rabbitmq
      RABBITMQ_USER: music_admin
      RABBITMQ_PASSWORD: music_pass
      RABBITMQ_VHOST: music
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production-min-32-chars}"
      SPRING_PROFILES_ACTIVE: logstash
      LOGSTASH_HOST: music-logstash
      LOGSTASH_PORT: 5044
    ports:
      - "8088:8088"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq-init:
        condition: service_completed_successfully
      logstash:
        condition: service_healthy
    restart: unless-stopped

  # ─── Streaming Service (Go) ─────────────────────────────────────────────────
  streaming-service:
    build:
      context: ..
      dockerfile: services/streaming-service/Dockerfile
    container_name: music-streaming-service
    environment:
      PORT: 8084
      SERVICE_NAME: streaming-service
      DATABASE_URL: postgres://music_admin:music_pass@music-postgres:5432/streaming_db?sslmode=disable
      RABBIT_URL: amqp://music_admin:music_pass@music-rabbitmq:5672/music
      REDIS_URL: redis://:music_pass@music-redis:6379
      MINIO_ENDPOINT: music-minio:9000
      MINIO_ACCESS_KEY: music_admin
      MINIO_SECRET_KEY: music_pass
      MINIO_USE_SSL: "false"
      CATALOG_SERVICE_URL: http://music-catalog-service:8082
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production-min-32-chars}"
      LOGSTASH_HOST: "music-logstash:5044"
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      logstash:
        condition: service_healthy
    restart: unless-stopped

  # ─── Upload Service (Go) ────────────────────────────────────────────────────
  upload-service:
    build:
      context: ..
      dockerfile: services/upload-service/Dockerfile
    container_name: music-upload-service
    environment:
      PORT: 8086
      SERVICE_NAME: upload-service
      DATABASE_URL: postgres://music_admin:music_pass@music-postgres:5432/upload_db?sslmode=disable
      RABBIT_URL: amqp://music_admin:music_pass@music-rabbitmq:5672/music
      MINIO_ENDPOINT: music-minio:9000
      MINIO_PUBLIC_ENDPOINT: 127.0.0.1:9000
      MINIO_ACCESS_KEY: music_admin
      MINIO_SECRET_KEY: music_pass
      MINIO_USE_SSL: "false"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production-min-32-chars}"
      # LOGSTASH_HOST: "music-logstash:5044"  # disabled: TCP writer blocks zerolog
    ports:
      - "8086:8086"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      logstash:
        condition: service_healthy
    restart: unless-stopped

  # ─── Search Service (NestJS) ────────────────────────────────────────────────
  search-service:
    build:
      context: ..
      dockerfile: services/search-service/Dockerfile
    container_name: music-search-service
    environment:
      PORT: 8085
      ELASTICSEARCH_NODE: http://music-elasticsearch:9200
      RABBITMQ_URL: amqp://music_admin:music_pass@music-rabbitmq:5672/music
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production-min-32-chars}"
      LOGSTASH_HOST: "music-logstash:5044"
    ports:
      - "8085:8085"
    depends_on:
      elasticsearch:
        condition: service_healthy
      rabbitmq-init:
        condition: service_completed_successfully
      logstash:
        condition: service_healthy
    restart: unless-stopped

  # ─── Notification Service (NestJS) ──────────────────────────────────────────
  notification-service:
    build:
      context: ..
      dockerfile: services/notification-service/Dockerfile
    container_name: music-notification-service
    environment:
      PORT: 8087
      MONGODB_URI: mongodb://music_admin:music_pass@music-mongodb:27017/notifications?authSource=admin
      RABBITMQ_URL: amqp://music_admin:music_pass@music-rabbitmq:5672/music
      REDIS_URL: redis://:music_pass@music-redis:6379
      CATALOG_SERVICE_URL: http://music-catalog-service:8082
      USER_SERVICE_URL: http://music-user-service:8081
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production-min-32-chars}"
      LOGSTASH_HOST: "music-logstash:5044"
    ports:
      - "8087:8087"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq-init:
        condition: service_completed_successfully
      logstash:
        condition: service_healthy
    restart: unless-stopped

  # ─── Recommend Service (FastAPI) ────────────────────────────────────────────
  recommend-service:
    build:
      context: ..
      dockerfile: services/recommend-service/Dockerfile
    container_name: music-recommend-service
    environment:
      PORT: 8000
      NEO4J_URI: bolt://music-neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: music_pass
      REDIS_URL: redis://:music_pass@music-redis:6379/0
      RABBITMQ_URL: amqp://music_admin:music_pass@music-rabbitmq:5672/music
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production-min-32-chars}"
      LOGSTASH_HOST: "music-logstash:5044"
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq-init:
        condition: service_completed_successfully
      logstash:
        condition: service_healthy
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════════════════════
  # MONITORING STACK
  # ═══════════════════════════════════════════════════════════════════════════════

  # ─── Prometheus — Metrics Scraping ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.4.1
    container_name: music-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Grafana — Dashboards & Visualization ────────────────────────────────────
  grafana:
    image: grafana/grafana:11.6.0
    container_name: music-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: music_pass
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/provisioning/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Logstash — Log Aggregation ──────────────────────────────────────────────
  logstash:
    image: docker.elastic.co/logstash/logstash:8.17.0
    container_name: music-logstash
    volumes:
      - ./monitoring/logstash/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./monitoring/logstash/pipeline:/usr/share/logstash/pipeline:ro
    ports:
      - "5044:5044"      # TCP/UDP log input
      - "5044:5044/udp"
      - "12201:12201/udp" # GELF input (Docker logs)
    environment:
      LS_JAVA_OPTS: "-Xmx256m -Xms256m"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9600 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ─── Kibana — Log Visualization (optional, Grafana covers logs via Elasticsearch datasource)
  # Uncomment if you need Kibana's Discover UI for advanced log exploration.
  # kibana:
  #   image: docker.elastic.co/kibana/kibana:8.17.0
  #   container_name: music-kibana
  #   environment:
  #     ELASTICSEARCH_HOSTS: '["http://music-elasticsearch:9200"]'
  #     XPACK_SECURITY_ENABLED: "false"
  #   ports:
  #     - "5601:5601"
  #   depends_on:
  #     elasticsearch:
  #       condition: service_healthy
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status || exit 1"]
  #     interval: 20s
  #     timeout: 10s
  #     retries: 5
  #     start_period: 60s
  #   restart: unless-stopped


# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  mongodb_data:
  elasticsearch_data:
  redis_data:
  minio_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:

# ─── Network ──────────────────────────────────────────────────────────────────
networks:
  default:
    name: music-app-network
