global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ─── API Gateway (KrakenD) ────────────────────────────────────────────────────
  - job_name: gateway
    static_configs:
      - targets: ["music-gateway:9091"]

  # ─── Spring Boot services (/actuator/prometheus) ──────────────────────────────
  - job_name: user-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["music-user-service:8081"]

  - job_name: catalog-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["music-catalog-service:8082"]

  - job_name: playlist-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["music-playlist-service:8083"]

  - job_name: library-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["music-library-service:8088"]

  # ─── Go services (/metrics) ──────────────────────────────────────────────────
  - job_name: streaming-service
    static_configs:
      - targets: ["music-streaming-service:8084"]

  - job_name: upload-service
    static_configs:
      - targets: ["music-upload-service:8086"]

  # ─── NestJS services (/metrics) ──────────────────────────────────────────────
  - job_name: search-service
    static_configs:
      - targets: ["music-search-service:8085"]

  - job_name: notification-service
    static_configs:
      - targets: ["music-notification-service:8087"]

  # ─── Python service (/metrics) ───────────────────────────────────────────────
  - job_name: recommend-service
    static_configs:
      - targets: ["music-recommend-service:8000"]

  # ─── Infrastructure ──────────────────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
