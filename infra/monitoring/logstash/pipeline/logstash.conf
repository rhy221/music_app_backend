input {
  # TCP input for JSON-formatted logs from all services
  tcp {
    port => 5044
    codec => json_lines
    tags => ["tcp"]
  }

  # UDP input as fallback
  udp {
    port => 5044
    codec => json_lines
    tags => ["udp"]
  }

  # Docker container logs via GELF
  gelf {
    port => 12201
    type => "docker"
  }
}

filter {
  # Parse timestamp if present
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss.SSS", "yyyy-MM-dd'T'HH:mm:ss.SSSZ"]
      target => "@timestamp"
      remove_field => ["timestamp"]
    }
  }

  # Normalize log level field
  if [level] {
    mutate {
      uppercase => ["level"]
    }
  } else if [severity] {
    mutate {
      rename => { "severity" => "level" }
      uppercase => ["level"]
    }
  }

  # Add service name from GELF host or existing field
  if [type] == "docker" and [host] {
    mutate {
      rename => { "host" => "service_name" }
    }
  }

  # Remove unnecessary fields
  mutate {
    remove_field => ["@version", "port"]
  }
}

output {
  elasticsearch {
    hosts => ["http://music-elasticsearch:9200"]
    index => "logstash-%{+YYYY.MM.dd}"
  }
}
