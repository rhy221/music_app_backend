monitoring:
  prometheus:
    enabled: true
    image:
      repository: prom/prometheus
      tag: v3.4.1
    storage: 5Gi
    retentionDays: 15
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  grafana:
    enabled: true
    image:
      repository: grafana/grafana
      tag: "11.6.0"
    storage: 2Gi
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi

  logstash:
    enabled: false
    image:
      repository: docker.elastic.co/logstash/logstash
      tag: "8.17.0"
    javaOpts: "-Xmx256m -Xms256m"
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 768Mi

  kibana:
    enabled: false
    image:
      repository: docker.elastic.co/kibana/kibana
      tag: "8.17.0"
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

  jaeger:
    enabled: true
    image:
      repository: jaegertracing/all-in-one
      tag: latest
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

ingress:
  enabled: true
  className: nginx
  host: music-app.local

cors:
  origins: "http://localhost:3000"
