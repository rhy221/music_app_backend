global:
  namespace: music-app
  imagePullPolicy: IfNotPresent

secrets:
  jwtSecret: "change-me-in-production-min-32-chars"
  postgres:
    user: music_admin
    password: music_pass
  redis:
    password: music_pass
  rabbitmq:
    user: music_admin
    password: music_pass
    vhost: music
  minio:
    accessKey: music_admin
    secretKey: music_pass
  neo4j:
    user: neo4j
    password: music_pass
  mongodb:
    user: music_admin
    password: music_pass
    database: notifications
  grafana:
    adminUser: admin
    adminPassword: music_pass
  smtp:
    host: smtp.mailtrap.io
    port: "587"
    user: ""
    pass: ""
    from: "no-reply@musicapp.com"
  google:
    tokenInfoUrl: "https://oauth2.googleapis.com/tokeninfo"

postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
  storage: 5Gi
  databases:
    - user_db
    - catalog_db
    - playlist_db
    - streaming_db
    - upload_db
    - library_db
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

mongodb:
  enabled: true
  image:
    repository: mongo
    tag: "7"
  storage: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 768Mi

neo4j:
  enabled: true
  image:
    repository: neo4j
    tag: "5-community"
  storage:
    data: 5Gi
    logs: 1Gi
  memory:
    heapInitial: 256m
    heapMax: 512m
    pagecache: 256m
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

elasticsearch:
  enabled: true
  image:
    repository: elasticsearch
    tag: "8.17.0"
  storage: 10Gi
  javaOpts: "-Xms512m -Xmx512m"
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 2Gi

redis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
  storage: 2Gi
  maxMemory: 256mb
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 384Mi

minio:
  enabled: true
  image:
    repository: minio/minio
    tag: latest
  mcImage:
    repository: minio/mc
    tag: latest
  storage: 10Gi
  buckets:
    - images
    - audio
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

rabbitmq:
  enabled: true
  image:
    repository: rabbitmq
    tag: "3.13-management-alpine"
  storage: 5Gi
  exchanges:
    - events.upload
    - events.catalog
    - events.streaming
    - events.user
    - events.playlist
  dlxExchanges:
    - events.upload.dlx
    - events.catalog.dlx
    - events.streaming.dlx
    - events.user.dlx
    - events.playlist.dlx
    - events.dead-letter
  queues:
    # recommend-service
    - name: recommend-service.catalog
      exchange: events.catalog
      routingKey: "events.track.#"
      dlx: events.catalog.dlx
    - name: recommend-service.streaming
      exchange: events.streaming
      routingKey: "events.track.played"
      dlx: events.streaming.dlx
    - name: recommend-service.user
      exchange: events.user
      routingKey: "events.user.followed"
      dlx: events.user.dlx
    # search-service
    - name: search-service.catalog
      exchange: events.catalog
      routingKey: "events.track.#"
      dlx: events.catalog.dlx
    # notification-service
    - name: notification-service.user
      exchange: events.user
      routingKey: "events.user.#"
      dlx: events.user.dlx
    - name: notification-service.playlist
      exchange: events.playlist
      routingKey: "events.playlist.#"
      dlx: events.playlist.dlx
    - name: notification-service.upload
      exchange: events.upload
      routingKey: "events.transcode.failed"
      dlx: events.upload.dlx
    - name: notification-service.catalog
      exchange: events.catalog
      routingKey: "events.track.published"
      dlx: events.catalog.dlx
    # streaming-service
    - name: streaming-service.catalog.events
      exchange: events.catalog
      routingKey: "events.track.#"
    # upload-service
    - name: upload-service.catalog.events
      exchange: events.catalog
      routingKey: "events.track.published"
    # catalog-service
    - name: catalog.transcode.completed
      exchange: events.upload
      routingKey: "events.transcode.completed"
      dlx: events.dead-letter
    - name: catalog.track.played
      exchange: events.streaming
      routingKey: "events.track.played"
      dlx: events.dead-letter
    - name: catalog.user.registered
      exchange: events.user
      routingKey: "events.user.registered"
      dlx: events.dead-letter
    - name: catalog.track.deleted
      exchange: events.upload
      routingKey: "events.track.deleted"
      dlx: events.dead-letter
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

services:
  gateway:
    enabled: true
    image:
      repository: music-app/gateway
      tag: latest
    replicas: 1
    port: 8080
    metricsPort: 9091
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi

  userService:
    enabled: true
    image:
      repository: music-app/user-service
      tag: latest
    replicas: 1
    port: 8081
    dbName: user_db
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
