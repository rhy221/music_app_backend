{{- if .Values.monitoring.logstash.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "music-app.labels" . | nindent 4 }}
    app.kubernetes.io/name: logstash
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  logstash.yml: |
    http.host: "0.0.0.0"
    xpack.monitoring.enabled: false
    pipeline.workers: 2
    pipeline.batch.size: 125
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-pipeline
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "music-app.labels" . | nindent 4 }}
    app.kubernetes.io/name: logstash
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  logstash.conf: |
    input {
      tcp {
        port => 5044
        codec => json_lines
        tags => ["tcp"]
      }
      udp {
        port => 5044
        codec => json_lines
        tags => ["udp"]
      }
      gelf {
        port => 12201
        type => "docker"
      }
    }
    filter {
      if [timestamp] {
        date {
          match => ["timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss.SSS", "yyyy-MM-dd'T'HH:mm:ss.SSSZ"]
          target => "@timestamp"
          remove_field => ["timestamp"]
        }
      }
      if [level] {
        mutate { uppercase => ["level"] }
      } else if [severity] {
        mutate {
          rename => { "severity" => "level" }
          uppercase => ["level"]
        }
      }
      if [type] == "docker" and [host] {
        mutate { rename => { "host" => "service_name" } }
      }
      mutate { remove_field => ["@version", "port"] }
    }
    output {
      elasticsearch {
        hosts => ["http://elasticsearch:9200"]
        index => "logstash-%{+YYYY.MM.dd}"
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "music-app.labels" . | nindent 4 }}
    app.kubernetes.io/name: logstash
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: logstash
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "music-app.labels" . | nindent 8 }}
        app.kubernetes.io/name: logstash
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: logstash
          image: "{{ .Values.monitoring.logstash.image.repository }}:{{ .Values.monitoring.logstash.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 5044
              name: tcp-input
              protocol: TCP
            - containerPort: 5044
              name: udp-input
              protocol: UDP
            - containerPort: 12201
              name: gelf
              protocol: UDP
            - containerPort: 9600
              name: api
              protocol: TCP
          env:
            - name: LS_JAVA_OPTS
              value: {{ .Values.monitoring.logstash.javaOpts | quote }}
          volumeMounts:
            - name: config
              mountPath: /usr/share/logstash/config
            - name: pipeline
              mountPath: /usr/share/logstash/pipeline
          livenessProbe:
            httpGet:
              path: /
              port: 9600
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 9600
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.monitoring.logstash.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: logstash-config
        - name: pipeline
          configMap:
            name: logstash-pipeline
---
apiVersion: v1
kind: Service
metadata:
  name: logstash
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "music-app.labels" . | nindent 4 }}
    app.kubernetes.io/name: logstash
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: logstash
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: 5044
      targetPort: 5044
      protocol: TCP
      name: tcp-input
    - port: 5044
      targetPort: 5044
      protocol: UDP
      name: udp-input
    - port: 12201
      targetPort: 12201
      protocol: UDP
      name: gelf
{{- end }}
