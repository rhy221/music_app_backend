{{- if .Values.monitoring.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "music-app.labels" . | nindent 4 }}
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true
      - name: Elasticsearch-Logs
        type: elasticsearch
        access: proxy
        url: http://elasticsearch:9200
        editable: true
        jsonData:
          index: "logstash-*"
          timeField: "@timestamp"
          esVersion: "8.17.0"
          logMessageField: message
          logLevelField: level
      - name: Jaeger
        type: jaeger
        access: proxy
        url: http://jaeger:16686
        editable: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "music-app.labels" . | nindent 4 }}
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /etc/grafana/dashboards
          foldersFromFilesStructure: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "music-app.labels" . | nindent 4 }}
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  services-overview.json: |
    {
      "uid": "music-services-overview",
      "title": "Music App - Services Overview",
      "tags": ["music-app", "microservices"],
      "timezone": "browser",
      "refresh": "10s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "service",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
            "query": "label_values(up, job)",
            "refresh": 2,
            "includeAll": true,
            "multi": true,
            "current": { "selected": true, "text": "All", "value": "$__all" }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Service Health",
          "type": "stat",
          "gridPos": { "h": 4, "w": 24, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus" },
          "targets": [
            { "expr": "up{job=~\"$service\"}", "legendFormat": "{{`{{job}}`}}" }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" }, "1": { "text": "UP", "color": "green" } } }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "red" },
                  { "value": 1, "color": "green" }
                ]
              }
            }
          },
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 2,
          "title": "Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "datasource": { "type": "prometheus" },
          "targets": [
            { "expr": "sum(rate(http_requests_total{job=~\"$service\"}[1m])) by (job)", "legendFormat": "{{`{{job}}`}}" }
          ],
          "fieldConfig": {
            "defaults": { "unit": "reqps", "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10, "pointSize": 5 } }
          }
        },
        {
          "id": 3,
          "title": "Request Duration p95 (s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "datasource": { "type": "prometheus" },
          "targets": [
            { "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=~\"$service\"}[5m])) by (le, job))", "legendFormat": "{{`{{job}}`}} p95" }
          ],
          "fieldConfig": {
            "defaults": { "unit": "s", "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10 } }
          }
        },
        {
          "id": 4,
          "title": "Error Rate (5xx)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "datasource": { "type": "prometheus" },
          "targets": [
            { "expr": "sum(rate(http_requests_total{job=~\"$service\", status=~\"5..\"}[1m])) by (job)", "legendFormat": "{{`{{job}}`}}" },
            { "expr": "sum(rate(http_requests_total{job=~\"$service\", statusCode=~\"5..\"}[1m])) by (job)", "legendFormat": "{{`{{job}}`}}" }
          ],
          "fieldConfig": {
            "defaults": { "unit": "reqps", "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10 }, "color": { "mode": "palette-classic" } }
          }
        },
        {
          "id": 5,
          "title": "Request Rate by Status Code",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "datasource": { "type": "prometheus" },
          "targets": [
            { "expr": "sum(rate(http_requests_total{job=~\"$service\"}[1m])) by (status)", "legendFormat": "{{`{{status}}`}}" },
            { "expr": "sum(rate(http_requests_total{job=~\"$service\"}[1m])) by (statusCode)", "legendFormat": "{{`{{statusCode}}`}}" }
          ],
          "fieldConfig": {
            "defaults": { "unit": "reqps", "custom": { "drawStyle": "bars", "lineWidth": 1, "fillOpacity": 50, "stacking": { "mode": "normal" } } }
          }
        },
        {
          "id": 6,
          "title": "JVM Memory Used (Spring Boot)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 20 },
          "datasource": { "type": "prometheus" },
          "targets": [
            { "expr": "jvm_memory_used_bytes{job=~\"user-service|catalog-service|playlist-service|library-service\", area=\"heap\"}", "legendFormat": "{{`{{job}}`}} - {{`{{id}}`}}" }
          ],
          "fieldConfig": {
            "defaults": { "unit": "bytes", "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10 } }
          }
        },
        {
          "id": 7,
          "title": "Process CPU Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 20 },
          "datasource": { "type": "prometheus" },
          "targets": [
            { "expr": "process_cpu_usage{job=~\"$service\"}", "legendFormat": "{{`{{job}}`}}" },
            { "expr": "process_cpu_seconds_total{job=~\"$service\"}", "legendFormat": "{{`{{job}}`}} (total)" }
          ],
          "fieldConfig": {
            "defaults": { "unit": "percentunit", "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10 } }
          }
        },
        {
          "id": 8,
          "title": "Gateway - Request Rate by Endpoint",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 28 },
          "datasource": { "type": "prometheus" },
          "targets": [
            { "expr": "sum(rate(http_requests_total{job=\"gateway\"}[1m])) by (method, path)", "legendFormat": "{{`{{method}}`}} {{`{{path}}`}}" }
          ],
          "fieldConfig": {
            "defaults": { "unit": "reqps", "custom": { "drawStyle": "bars", "fillOpacity": 50, "stacking": { "mode": "normal" } } }
          }
        }
      ],
      "schemaVersion": 39
    }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "music-app.labels" . | nindent 4 }}
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.monitoring.grafana.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "music-app.labels" . | nindent 4 }}
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "music-app.labels" . | nindent 8 }}
        app.kubernetes.io/name: grafana
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: grafana
          image: "{{ .Values.monitoring.grafana.image.repository }}:{{ .Values.monitoring.grafana.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "music-app.fullname" . }}-secrets
                  key: grafana-admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "music-app.fullname" . }}-secrets
                  key: grafana-admin-password
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /etc/grafana/dashboards
            - name: data
              mountPath: /var/lib/grafana
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.monitoring.grafana.resources | nindent 12 }}
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-provider
          configMap:
            name: grafana-dashboards-provider
        - name: dashboards
          configMap:
            name: grafana-dashboards
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "music-app.labels" . | nindent 4 }}
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
{{- end }}
