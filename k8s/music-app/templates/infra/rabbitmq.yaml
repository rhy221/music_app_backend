{{- if .Values.rabbitmq.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "music-app.labels" . | nindent 4 }}
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  serviceName: rabbitmq
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rabbitmq
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "music-app.labels" . | nindent 8 }}
        app.kubernetes.io/name: rabbitmq
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: rabbitmq
          image: {{ .Values.rabbitmq.image.repository }}:{{ .Values.rabbitmq.image.tag }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 5672
              name: amqp
              protocol: TCP
            - containerPort: 15672
              name: management
              protocol: TCP
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "music-app.fullname" . }}-secrets
                  key: rabbitmq-user
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "music-app.fullname" . }}-secrets
                  key: rabbitmq-password
            - name: RABBITMQ_DEFAULT_VHOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "music-app.fullname" . }}-secrets
                  key: rabbitmq-vhost
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
          startupProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - ping
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 15
            failureThreshold: 30
          livenessProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - ping
            periodSeconds: 30
            timeoutSeconds: 15
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - ping
            periodSeconds: 15
            timeoutSeconds: 15
            failureThreshold: 3
          resources:
            {{- toYaml .Values.rabbitmq.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: rabbitmq-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.rabbitmq.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "music-app.labels" . | nindent 4 }}
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: 5672
      targetPort: 5672
      protocol: TCP
      name: amqp
    - port: 15672
      targetPort: 15672
      protocol: TCP
      name: management
---
apiVersion: batch/v1
kind: Job
metadata:
  name: rabbitmq-init
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "music-app.labels" . | nindent 4 }}
    app.kubernetes.io/name: rabbitmq-init
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "15"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rabbitmq-init
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/part-of: music-app
    spec:
      restartPolicy: OnFailure
      containers:
        - name: rabbitmq-init
          image: curlimages/curl:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              until curl -sf -u "$RABBITMQ_USER:$RABBITMQ_PASS" "http://rabbitmq:15672/api/overview" > /dev/null 2>&1; do
                echo "Waiting for RabbitMQ management API..."
                sleep 3
              done
              API="http://rabbitmq:15672/api"
              AUTH="$RABBITMQ_USER:$RABBITMQ_PASS"
              V="$RABBITMQ_VHOST"
              EX_BODY='{"type":"topic","durable":true,"auto_delete":false,"internal":false,"arguments":{}}'

              # --- Create topic exchanges ---
              {{- range .Values.rabbitmq.exchanges }}
              curl -sf -u "$AUTH" -X PUT "$API/exchanges/$V/{{ . }}" \
                -H "content-type: application/json" -d "$EX_BODY"
              echo "Created exchange: {{ . }}"
              {{- end }}

              # --- Create dead-letter exchanges ---
              {{- range .Values.rabbitmq.dlxExchanges }}
              curl -sf -u "$AUTH" -X PUT "$API/exchanges/$V/{{ . }}" \
                -H "content-type: application/json" -d "$EX_BODY"
              echo "Created DLX exchange: {{ . }}"
              {{- end }}

              # --- Create queues and bindings ---
              {{- range .Values.rabbitmq.queues }}
              {{- if .dlx }}
              curl -sf -u "$AUTH" -X PUT "$API/queues/$V/{{ .name }}" \
                -H "content-type: application/json" \
                -d '{"durable":true,"arguments":{"x-dead-letter-exchange":"{{ .dlx }}"}}'
              {{- else }}
              curl -sf -u "$AUTH" -X PUT "$API/queues/$V/{{ .name }}" \
                -H "content-type: application/json" \
                -d '{"durable":true,"arguments":{}}'
              {{- end }}
              curl -sf -u "$AUTH" -X POST "$API/bindings/$V/e/{{ .exchange }}/q/{{ .name }}" \
                -H "content-type: application/json" \
                -d '{"routing_key":"{{ .routingKey }}","arguments":{}}'
              echo "Created queue {{ .name }} -> {{ .exchange }} [{{ .routingKey }}]"
              {{- end }}
          env:
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "music-app.fullname" . }}-secrets
                  key: rabbitmq-user
            - name: RABBITMQ_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "music-app.fullname" . }}-secrets
                  key: rabbitmq-password
            - name: RABBITMQ_VHOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "music-app.fullname" . }}-secrets
                  key: rabbitmq-vhost
{{- end }}
