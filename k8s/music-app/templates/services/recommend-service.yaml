{{- if .Values.services.recommendService.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommend-service
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "music-app.labels" . | nindent 4 }}
    app.kubernetes.io/name: recommend-service
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.services.recommendService.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: recommend-service
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "music-app.labels" . | nindent 8 }}
        app.kubernetes.io/name: recommend-service
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: recommend-service
          image: "{{ .Values.services.recommendService.image.repository }}:{{ .Values.services.recommendService.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          env:
            - name: PORT
              value: "8000"
            - name: NEO4J_URI
              value: "bolt://neo4j:7687"
            - name: NEO4J_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "music-app.fullname" . }}-secrets
                  key: neo4j-user
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "music-app.fullname" . }}-secrets
                  key: neo4j-password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "music-app.fullname" . }}-secrets
                  key: redis-password
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis:6379/0"
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "music-app.fullname" . }}-secrets
                  key: rabbitmq-user
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "music-app.fullname" . }}-secrets
                  key: rabbitmq-password
            - name: RABBITMQ_VHOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "music-app.fullname" . }}-secrets
                  key: rabbitmq-vhost
            - name: RABBITMQ_URL
              value: "amqp://$(RABBITMQ_USER):$(RABBITMQ_PASSWORD)@rabbitmq:5672/$(RABBITMQ_VHOST)"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "music-app.fullname" . }}-secrets
                  key: jwt-secret
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.services.recommendService.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: recommend-service
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "music-app.labels" . | nindent 4 }}
    app.kubernetes.io/name: recommend-service
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: recommend-service
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
{{- end }}
