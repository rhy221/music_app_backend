{{- if .Values.services.gateway.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "music-app.labels" . | nindent 4 }}
    app.kubernetes.io/name: gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  {{- if not (and .Values.services.gateway.autoscaling .Values.services.gateway.autoscaling.enabled) }}
  replicas: {{ .Values.services.gateway.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "music-app.labels" . | nindent 8 }}
        app.kubernetes.io/name: gateway
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      initContainers:
        - name: rewrite-config
          image: "{{ .Values.services.gateway.image.repository }}:{{ .Values.services.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              cp /etc/krakend/krakend.json /config/krakend.json
              sed -i 's|music-user-service|user-service|g' /config/krakend.json
              sed -i 's|music-catalog-service|catalog-service|g' /config/krakend.json
              sed -i 's|music-playlist-service|playlist-service|g' /config/krakend.json
              sed -i 's|music-streaming-service|streaming-service|g' /config/krakend.json
              sed -i 's|music-search-service|search-service|g' /config/krakend.json
              sed -i 's|music-upload-service|upload-service|g' /config/krakend.json
              sed -i 's|music-notification-service|notification-service|g' /config/krakend.json
              sed -i 's|music-library-service|library-service|g' /config/krakend.json
              sed -i 's|music-recommend-service|recommend-service|g' /config/krakend.json
              sed -i 's|host.docker.internal:8081|user-service:8081|g' /config/krakend.json
              sed -i 's|host.docker.internal:8082|catalog-service:8082|g' /config/krakend.json
              sed -i 's|host.docker.internal:8083|playlist-service:8083|g' /config/krakend.json
              sed -i 's|host.docker.internal:8084|streaming-service:8084|g' /config/krakend.json
              sed -i 's|host.docker.internal:8085|search-service:8085|g' /config/krakend.json
              sed -i 's|host.docker.internal:8086|upload-service:8086|g' /config/krakend.json
              sed -i 's|host.docker.internal:8087|notification-service:8087|g' /config/krakend.json
              sed -i 's|host.docker.internal:8088|library-service:8088|g' /config/krakend.json
              sed -i 's|host.docker.internal:8000|recommend-service:8000|g' /config/krakend.json
          volumeMounts:
            - name: krakend-config
              mountPath: /config
      containers:
        - name: gateway
          image: "{{ .Values.services.gateway.image.repository }}:{{ .Values.services.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command: ["/entrypoint.sh"]
          args: ["run", "-c", "/config/krakend.json"]
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
            - containerPort: 9091
              name: metrics
              protocol: TCP
          env:
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "music-app.fullname" . }}-secrets
                  key: jwt-secret
          volumeMounts:
            - name: krakend-config
              mountPath: /config
          livenessProbe:
            httpGet:
              path: /__health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /__health
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.services.gateway.resources | nindent 12 }}
      volumes:
        - name: krakend-config
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "music-app.labels" . | nindent 4 }}
    app.kubernetes.io/name: gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
    - port: 9091
      targetPort: 9091
      protocol: TCP
      name: metrics
{{- end }}
