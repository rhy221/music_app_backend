{{- if .Values.services.searchService.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-service
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "music-app.labels" . | nindent 4 }}
    app.kubernetes.io/name: search-service
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  {{- if not (and .Values.services.searchService.autoscaling .Values.services.searchService.autoscaling.enabled) }}
  replicas: {{ .Values.services.searchService.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: search-service
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "music-app.labels" . | nindent 8 }}
        app.kubernetes.io/name: search-service
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: search-service
          image: "{{ .Values.services.searchService.image.repository }}:{{ .Values.services.searchService.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 8085
              name: http
              protocol: TCP
          env:
            - name: PORT
              value: "8085"
            - name: ELASTICSEARCH_NODE
              value: "http://elasticsearch:9200"
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "music-app.fullname" . }}-secrets
                  key: rabbitmq-user
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "music-app.fullname" . }}-secrets
                  key: rabbitmq-password
            - name: RABBITMQ_VHOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "music-app.fullname" . }}-secrets
                  key: rabbitmq-vhost
            - name: RABBITMQ_URL
              value: "amqp://$(RABBITMQ_USER):$(RABBITMQ_PASSWORD)@rabbitmq:5672/$(RABBITMQ_VHOST)"
          livenessProbe:
            httpGet:
              path: /health
              port: 8085
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8085
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.services.searchService.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: search-service
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "music-app.labels" . | nindent 4 }}
    app.kubernetes.io/name: search-service
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: search-service
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: 8085
      targetPort: 8085
      protocol: TCP
      name: http
{{- end }}
