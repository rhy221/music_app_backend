{{- if .Values.services.uploadService.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: upload-service
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "music-app.labels" . | nindent 4 }}
    app.kubernetes.io/name: upload-service
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  {{- if not (and .Values.services.uploadService.autoscaling .Values.services.uploadService.autoscaling.enabled) }}
  replicas: {{ .Values.services.uploadService.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: upload-service
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "music-app.labels" . | nindent 8 }}
        app.kubernetes.io/name: upload-service
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: upload-service
          image: "{{ .Values.services.uploadService.image.repository }}:{{ .Values.services.uploadService.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 8086
              name: http
              protocol: TCP
          env:
            - name: PORT
              value: "8086"
            - name: SERVICE_NAME
              value: "upload-service"
            - name: LOG_LEVEL
              value: "debug"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "music-app.fullname" . }}-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "music-app.fullname" . }}-secrets
                  key: postgres-password
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/{{ .Values.services.uploadService.dbName }}?sslmode=disable"
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "music-app.fullname" . }}-secrets
                  key: rabbitmq-user
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "music-app.fullname" . }}-secrets
                  key: rabbitmq-password
            - name: RABBITMQ_VHOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "music-app.fullname" . }}-secrets
                  key: rabbitmq-vhost
            - name: RABBIT_URL
              value: "amqp://$(RABBITMQ_USER):$(RABBITMQ_PASSWORD)@rabbitmq:5672/$(RABBITMQ_VHOST)"
            - name: MINIO_ENDPOINT
              value: "minio:9000"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "music-app.fullname" . }}-secrets
                  key: minio-access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "music-app.fullname" . }}-secrets
                  key: minio-secret-key
            - name: MINIO_USE_SSL
              value: "false"
            - name: MINIO_PUBLIC_ENDPOINT
              value: "localhost:9000"
            - name: TRANSCODE_WORKERS
              value: "2"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "music-app.fullname" . }}-secrets
                  key: jwt-secret
          livenessProbe:
            httpGet:
              path: /health
              port: 8086
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8086
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.services.uploadService.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: upload-service
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "music-app.labels" . | nindent 4 }}
    app.kubernetes.io/name: upload-service
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: upload-service
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: 8086
      targetPort: 8086
      protocol: TCP
      name: http
{{- end }}
