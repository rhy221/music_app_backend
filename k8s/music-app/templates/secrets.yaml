apiVersion: v1
kind: Secret
metadata:
  name: {{ include "music-app.secretName" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "music-app.labels" . | nindent 4 }}
type: Opaque
data:
  # JWT
  jwt-secret: {{ .Values.secrets.jwtSecret | b64enc | quote }}

  # PostgreSQL
  postgres-user: {{ .Values.secrets.postgres.user | b64enc | quote }}
  postgres-password: {{ .Values.secrets.postgres.password | b64enc | quote }}

  # Redis
  redis-password: {{ .Values.secrets.redis.password | b64enc | quote }}

  # RabbitMQ
  rabbitmq-user: {{ .Values.secrets.rabbitmq.user | b64enc | quote }}
  rabbitmq-password: {{ .Values.secrets.rabbitmq.password | b64enc | quote }}
  rabbitmq-vhost: {{ .Values.secrets.rabbitmq.vhost | b64enc | quote }}

  # MinIO
  minio-access-key: {{ .Values.secrets.minio.accessKey | b64enc | quote }}
  minio-secret-key: {{ .Values.secrets.minio.secretKey | b64enc | quote }}

  # Neo4j
  neo4j-user: {{ .Values.secrets.neo4j.user | b64enc | quote }}
  neo4j-password: {{ .Values.secrets.neo4j.password | b64enc | quote }}

  # MongoDB
  mongodb-user: {{ .Values.secrets.mongodb.user | b64enc | quote }}
  mongodb-password: {{ .Values.secrets.mongodb.password | b64enc | quote }}

  # Grafana
  grafana-admin-user: {{ .Values.secrets.grafana.adminUser | b64enc | quote }}
  grafana-admin-password: {{ .Values.secrets.grafana.adminPassword | b64enc | quote }}

  # SMTP
  smtp-host: {{ .Values.secrets.smtp.host | b64enc | quote }}
  smtp-port: {{ .Values.secrets.smtp.port | b64enc | quote }}
  smtp-user: {{ .Values.secrets.smtp.user | b64enc | quote }}
  smtp-pass: {{ .Values.secrets.smtp.pass | b64enc | quote }}
  smtp-from: {{ .Values.secrets.smtp.from | b64enc | quote }}
