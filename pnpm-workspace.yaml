packages:
  - 'packages/*'
  - 'services/*'
  - 'libs/*'

allowBuilds:
  '@asyncapi/cli': true
  '@hyperjump/json-pointer': true
  '@hyperjump/json-schema': true
  '@hyperjump/json-schema-core': true
  '@hyperjump/pact': true
  '@nestjs/core': true
  '@parcel/watcher': true
  '@swc/core': true
  less: true
  nx: true
  protobufjs: true
  sharp: true
  unrs-resolver: true
  yarn: true

patchedDependencies:
  '@jnxplus/nx-gradle@2.3.0': patches/@jnxplus__nx-gradle@2.3.0.patch
