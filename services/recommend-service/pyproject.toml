[tool.coverage.run]
branch = true
source = [ "recommend_service" ]

[tool.coverage.report]
exclude_lines = ['if TYPE_CHECKING:']
show_missing = true

[tool.flake8]
max-line-length = 120

[tool.pytest.ini_options]
asyncio_mode = "auto"
addopts = """
 --cov
 --cov-report html:'../../coverage/services/recommend-service/html'
 --cov-report xml:'../../coverage/services/recommend-service/coverage.xml'
 --html='../../reports/services/recommend-service/unittests/html/index.html'
 --junitxml='../../reports/services/recommend-service/unittests/junit.xml'
"""

[tool.poetry]
name = "recommend-service"
version = "1.0.0"
description = "Automatically generated by Nx."
authors = [ ]
license = 'Proprietary'
readme = 'README.md'

  [[tool.poetry.packages]]
  include = "recommend_service"

  [tool.poetry.dependencies]
  python = ">=3.10,<3.13"
  fastapi = "^0.136.3"
  uvicorn = "^0.49.0"
  neo4j = "^5.0"
  graphdatascience = "^1.0"
  redis = { version = "^5.0", extras = ["asyncio"] }
  aio-pika = "^9.0"
  pydantic-settings = "^2.0"
  prometheus-fastapi-instrumentator = "^7.0"
  python-json-logger = "^3.3"
  opentelemetry-distro = "*"
  opentelemetry-exporter-otlp = "*"
  opentelemetry-instrumentation-fastapi = "*"
  music-events = { path = "../../libs/events/python/music-events", develop = true }

  [tool.poetry.group.dev.dependencies]
  autopep8 = "2.3.1"
  flake8 = "7.1.1"
  pytest = "8.3.4"
  pytest-sugar = "1.0.0"
  pytest-cov = "6.0.0"
  pytest-html = "4.1.1"
  pytest-asyncio = "0.24.0"
  httpx = "^0.27.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
