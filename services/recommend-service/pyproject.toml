[tool.coverage.run]
branch = true
source = [ "recommend_service" ]

[tool.coverage.report]
exclude_lines = ['if TYPE_CHECKING:']
show_missing = true

[tool.pytest.ini_options]
addopts = """
 --cov
 --cov-report html:'../../coverage/services/recommend-service/html'
 --cov-report xml:'../../coverage/services/recommend-service/coverage.xml'
 --html='../../reports/services/recommend-service/unittests/html/index.html'
 --junitxml='../../reports/services/recommend-service/unittests/junit.xml'
"""

[tool.poetry]
name = "recommend-service"
version = "1.0.0"
description = "Automatically generated by Nx."
authors = [ ]
license = 'Proprietary'
readme = 'README.md'

  [[tool.poetry.packages]]
  include = "recommend_service"

  [tool.poetry.dependencies]
  python = ">=3.10,<3.13"
  fastapi = "^0.136.3"
  uvicorn = "^0.49.0"

  [tool.poetry.group.dev.dependencies]
  autopep8 = "2.3.1"
  flake8 = "7.1.1"
  pytest = "8.3.4"
  pytest-sugar = "1.0.0"
  pytest-cov = "6.0.0"
  pytest-html = "4.1.1"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
