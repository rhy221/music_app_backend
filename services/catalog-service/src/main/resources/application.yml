spring:
  application:
    name: catalog-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:catalog_db}
    username: ${DB_USER:music_admin}
    password: ${DB_PASSWORD:music_pass}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: catalog_schema
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    open-in-view: false

  flyway:
    enabled: true
    schemas: catalog_schema
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:music_pass}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:music_admin}
    password: ${RABBITMQ_PASSWORD:music_pass}
    virtual-host: ${RABBITMQ_VHOST:music}
    listener:
      simple:
        acknowledge-mode: auto
        prefetch: 10

server:
  port: 8082

jwt:
  secret: ${JWT_SECRET:change-me-in-production-min-32-chars}
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

catalog:
  queues:
    transcode-completed: catalog.transcode.completed
    track-played: catalog.track.played
    user-role-updated: catalog.user.role.updated
    user-registered: catalog.user.registered
    user-profile-updated: catalog.user.profile.updated

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      service: catalog-service
